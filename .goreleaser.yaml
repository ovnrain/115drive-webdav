# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# https://goreleaser.com
version: 2

project_name: 115drive-webdav

before:
  hooks:
    - go mod tidy

builds:
  - id: 115drive-webdav
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
      - mips
      - mipsle
      - mips64
      - mips64le
    goarm:
      - '5'
      - '6'
      - '7'
    gomips:
      - hardfloat
      - softfloat
    ignore:
      # 32-bit Windows ARM is rarely useful
      - goos: windows
        goarch: arm

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    # darwin→Darwin, linux→Linux, windows→Windows, 386→i386, amd64→x86_64
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}

checksum:
  name_template: checksums.txt

# Modern multi-arch images via buildx (replaces dockers + docker_manifests).
dockers_v2:
  - images:
      - ovnrain/115drive-webdav
    tags:
      - "{{ .Tag }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
      - "{{ if not .IsNightly }}v{{ .Major }}{{ end }}"
      - "{{ if not .IsNightly }}v{{ .Major }}.{{ .Minor }}{{ end }}"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
      - linux/arm/v6
      - linux/386
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "115 drive WebDAV server"
      org.opencontainers.image.url: "https://github.com/ovnrain/115drive-webdav"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
